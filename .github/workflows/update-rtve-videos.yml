name: Update RTVE videos

concurrency:
  group: update-rtve-videos
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 18 * * *"
    - cron: "30 23 * * *"

permissions:
  contents: write

jobs:
  update-rtve-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update videos-rtve.json
        run: python scripts/update_rtve_videos.py

      - name: Commit changes if videos changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update RTVE video summaries"
          file_pattern: videos-rtve.json
